<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>벨로 (Vélo) — 비밀번호 재설정</title>
<link rel="stylesheet" href="./velo-common.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --black:#0a0a0a; --white:#f5f3ee; --accent:#c8f542; --gray:#1a1a1a; --muted:#888; --error:#ff4f4f; --border:rgba(255,255,255,0.08); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--white); font-family:'Noto Sans KR',sans-serif; font-weight:300; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }

  .box { width:100%; max-width:400px; }

  .logo { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:4px; color:var(--accent); text-decoration:none; display:block; margin-bottom:40px; }

  .screen { display:none; flex-direction:column; gap:20px; }
  .screen.active { display:flex; }

  .title { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:2px; margin-bottom:4px; }
  .sub { font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:4px; }

  .field { display:flex; flex-direction:column; gap:8px; }
  .field label { font-size:11px; letter-spacing:2px; color:var(--muted); }
  .field input { background:var(--gray); border:1px solid var(--border); color:var(--white); padding:14px 16px; font-family:'Noto Sans KR',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
  .field input:focus { border-color:var(--accent); }
  .field input::placeholder { color:rgba(255,255,255,0.2); }
  .field-error { font-size:11px; color:var(--error); display:none; }
  .field-error.show { display:block; }

  .pw-strength { display:flex; gap:4px; margin-top:4px; }
  .pw-bar { height:3px; flex:1; background:rgba(255,255,255,0.1); transition:background 0.3s; }
  .pw-bar.weak { background:var(--error); }
  .pw-bar.medium { background:#f5a623; }
  .pw-bar.strong { background:var(--accent); }

  .btn-main { background:var(--accent); color:var(--black); border:none; padding:16px; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px; cursor:pointer; width:100%; transition:opacity 0.2s; }
  .btn-main:hover { opacity:0.9; }
  .btn-main.loading { opacity:0.6; pointer-events:none; }

  .btn-ghost { background:transparent; border:none; color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; text-align:center; padding:8px; }
  .btn-ghost:hover { color:var(--white); }

  .error-banner { background:rgba(255,79,79,0.1); border:1px solid rgba(255,79,79,0.3); color:var(--error); padding:12px 16px; font-size:13px; display:none; }
  .error-banner.show { display:block; }

  .success-icon { width:64px; height:64px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto; }
</style>
</head>
<body>

<div class="box">
  <a href="velo-landing.html" class="logo">VÉLO</a>

  <div class="error-banner" id="errorBanner"></div>

  <!-- 이메일 입력 -->
  <div class="screen active" id="screenEmail">
    <div>
      <div class="title">비밀번호 재설정</div>
      <div class="sub">가입한 이메일을 입력하면 재설정 링크를 보내드려요.</div>
    </div>
    <div class="field">
      <label>이메일</label>
      <input type="email" id="resetEmail" placeholder="hello@velo.kr">
      <div class="field-error" id="emailErr">올바른 이메일을 입력해주세요.</div>
    </div>
    <button class="btn-main" id="sendBtn" onclick="handleSend()">재설정 링크 받기</button>
    <button class="btn-ghost" onclick="location.href='velo-auth.html'">← 로그인으로 돌아가기</button>
  </div>

  <!-- 발송 완료 -->
  <div class="screen" id="screenSent">
    <div class="success-icon">✉️</div>
    <div style="text-align:center;">
      <div class="title" style="text-align:center;">이메일 확인!</div>
      <div class="sub" style="text-align:center;">재설정 링크를 발송했습니다.<br>이메일을 확인해주세요.</div>
    </div>
    <button class="btn-main" onclick="location.href='velo-auth.html'">로그인으로 가기</button>
  </div>

  <!-- 새 비밀번호 입력 (링크 클릭 후) -->
  <div class="screen" id="screenNewPw">
    <div>
      <div class="title">새 비밀번호</div>
      <div class="sub">새로운 비밀번호를 입력해주세요.</div>
    </div>
    <div class="field">
      <label>새 비밀번호</label>
      <input type="password" id="newPw" placeholder="8자 이상" oninput="checkPwStrength(this.value)">
      <div class="pw-strength">
        <div class="pw-bar" id="bar1"></div>
        <div class="pw-bar" id="bar2"></div>
        <div class="pw-bar" id="bar3"></div>
      </div>
      <div class="field-error" id="pwErr">8자 이상 입력해주세요.</div>
    </div>
    <div class="field">
      <label>비밀번호 확인</label>
      <input type="password" id="newPwConfirm" placeholder="••••••••">
      <div class="field-error" id="pwConfirmErr">비밀번호가 일치하지 않습니다.</div>
    </div>
    <button class="btn-main" id="updateBtn" onclick="handleUpdate()">비밀번호 변경</button>
  </div>

  <!-- 변경 완료 -->
  <div class="screen" id="screenDone">
    <div class="success-icon">✓</div>
    <div style="text-align:center;">
      <div class="title" style="text-align:center;">변경 완료!</div>
      <div class="sub" style="text-align:center;">비밀번호가 변경되었습니다.</div>
    </div>
    <button class="btn-main" onclick="location.href='velo-dashboard.html'">대시보드로 가기</button>
  </div>

</div>

<script type="module">
  import { supabase } from './velo-supabase.js'

  function goScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
    document.getElementById(id).classList.add('active')
    document.getElementById('errorBanner').classList.remove('show')
  }

  function showBanner(msg) {
    const el = document.getElementById('errorBanner')
    el.textContent = msg; el.classList.add('show')
  }

  function showErr(id, show) {
    document.getElementById(id).classList.toggle('show', show)
    return show
  }

  window.checkPwStrength = function(pw) {
    const bars = ['bar1','bar2','bar3']
    bars.forEach(b => { document.getElementById(b).className = 'pw-bar' })
    if (!pw) return
    let s = 0
    if (pw.length >= 8) s++
    if (/[A-Z]/.test(pw) || /[0-9]/.test(pw)) s++
    if (/[^A-Za-z0-9]/.test(pw) && pw.length >= 10) s++
    const cls = ['weak','medium','strong']
    for (let i = 0; i < s; i++) document.getElementById(bars[i]).classList.add(cls[s-1])
  }

  // 재설정 링크 발송
  window.handleSend = async function() {
    const email = document.getElementById('resetEmail').value.trim()
    if (!email || !/\S+@\S+\.\S+/.test(email)) { showErr('emailErr', true); return; }
    showErr('emailErr', false)
    const btn = document.getElementById('sendBtn')
    btn.textContent = '발송 중...'; btn.classList.add('loading')
    try {
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/velo-reset.html'
      })
      if (error) throw error
      goScreen('screenSent')
    } catch(e) {
      btn.textContent = '재설정 링크 받기'; btn.classList.remove('loading')
      showBanner(e.message || '발송 실패. 다시 시도해주세요.')
    }
  }

  // 새 비밀번호 업데이트
  window.handleUpdate = async function() {
    const pw = document.getElementById('newPw').value
    const pwc = document.getElementById('newPwConfirm').value
    let err = false
    if (!pw || pw.length < 8) err = showErr('pwErr', true); else showErr('pwErr', false)
    if (pw !== pwc) err = showErr('pwConfirmErr', true); else showErr('pwConfirmErr', false)
    if (err) return
    const btn = document.getElementById('updateBtn')
    btn.textContent = '변경 중...'; btn.classList.add('loading')
    try {
      const { error } = await supabase.auth.updateUser({ password: pw })
      if (error) throw error
      goScreen('screenDone')
    } catch(e) {
      btn.textContent = '비밀번호 변경'; btn.classList.remove('loading')
      showBanner(e.message || '변경 실패. 다시 시도해주세요.')
    }
  }

  // URL 파라미터로 비밀번호 변경 화면 표시
  const hash = window.location.hash
  if (hash.includes('type=recovery')) {
    goScreen('screenNewPw')
  }

  // 엔터키
  document.getElementById('resetEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSend()
  })
</script>
</body>
</html>
