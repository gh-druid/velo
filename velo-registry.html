<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/velo-theme.css">
<title>벨로 (Vélo) — 전체 등록 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --black:#faf8f0; --white:#20251a; --accent:#c8f542; --gray:#ffffff; --muted:#5f6a59; --border:rgba(20,24,15,0.08); --error:#ff4f4f; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#faf8f0; color:#14180f; font-family:'Pretendard',sans-serif; font-weight:400; min-height:100vh; -webkit-font-smoothing:antialiased; }
  button, a { cursor:pointer; touch-action:manipulation; }
  input, select { font-size:16px !important; }

  nav { display:flex; justify-content:space-between; align-items:center; padding:0 40px; height:70px; background:var(--gray); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
  .nav-logo { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:4px; color:#5f8c0a; text-decoration:none; display:flex; align-items:center; line-height:1; }
  .nav-right { display:flex; align-items:center; gap:12px; }
  .btn-nav { background:var(--accent); color:#14180f; border:none; padding:9px 20px; border-radius:10px; font-family:'Pretendard',sans-serif; font-size:13px; font-weight:700; cursor:pointer; text-decoration:none; }
  @media(max-width:768px) { nav { padding:0 16px; } }

  .content { max-width:1100px; margin:0 auto; padding:40px; }
  .page-title { font-weight:800; font-size:32px; letter-spacing:-0.9px; margin-bottom:6px; color:#14180f; }
  .page-sub { font-size:13.5px; color:var(--muted); margin-bottom:32px; }

  .search-bar { display:flex; gap:12px; margin-bottom:24px; }
  .search-input { flex:1; background:var(--gray); border:1px solid var(--border); color:#14180f; padding:13px 16px; border-radius:11px; font-family:'Pretendard',sans-serif; font-size:15px; outline:none; transition:border-color .18s, box-shadow .18s; }
  .search-input:focus { border-color:#5f8c0a; box-shadow:0 0 0 3px rgba(200,245,66,0.25); }
  .search-input::placeholder { color:#a8afa0; }
  .filter-select { background:var(--gray); border:1px solid var(--border); color:#14180f; padding:13px 16px; border-radius:11px; font-family:'Pretendard',sans-serif; font-size:14px; outline:none; }

  .stats-row { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
  .stat-box { background:var(--gray); border:1px solid var(--border); border-radius:14px; box-shadow:0 1px 2px rgba(20,24,15,.04),0 8px 20px rgba(20,24,15,.05); padding:18px 24px; flex:1; min-width:120px; }
  .stat-label { font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:8px; }
  .stat-num { font-weight:800; font-size:30px; letter-spacing:-1px; color:#14180f; }
  .stat-num.accent { color:#5f8c0a; }
  .stat-num.red { color:var(--error); }

  .bike-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
  .bike-card { background:var(--gray); border:1px solid var(--border); border-radius:16px; box-shadow:0 1px 2px rgba(20,24,15,.04),0 8px 20px rgba(20,24,15,.05); padding:22px; transition:transform .2s, box-shadow .2s; text-decoration:none; display:block; cursor:pointer; }
  .bike-card:hover { transform:translateY(-3px); box-shadow:0 1px 2px rgba(20,24,15,.04),0 18px 38px rgba(20,24,15,.1); }
  .bike-card.stolen { border-color:rgba(216,69,63,0.4); }
  .bike-brand { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:0.4px; margin-bottom:6px; }
  .bike-model { font-size:18px; font-weight:700; letter-spacing:-0.3px; color:#14180f; margin-bottom:12px; }
  .bike-serial { font-family:'DM Mono',monospace; font-size:12px; color:#5f8c0a; letter-spacing:1px; margin-bottom:12px; }
  .bike-status { display:inline-block; font-size:11px; font-weight:700; letter-spacing:0.2px; padding:4px 11px; border-radius:999px; }
  .bike-status.normal { color:#5f8c0a; background:rgba(200,245,66,0.22); }
  .bike-status.stolen { color:var(--error); background:rgba(216,69,63,0.12); }
  .bike-date { font-size:11.5px; color:var(--muted); margin-top:10px; }

  .empty { text-align:center; padding:80px 0; color:var(--muted); font-size:14px; }
  .loading { text-align:center; padding:60px 0; color:var(--muted); font-size:13px; }

  @media(max-width:768px) {
    .content { padding:24px 16px; }
    .bike-grid { grid-template-columns:1fr; }
    .search-bar { flex-direction:column; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">VÉLO</a>
  <div class="nav-right">
    <button onclick="history.back()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:8px 16px; font-family:'Pretendard',sans-serif; font-size:13px; cursor:pointer;">← 뒤로</button>
    <a href="/login" id="authBtn" class="btn-nav">로그인</a>
  </div>
</nav>

<div class="content">
  <div class="page-head">
    <div class="eyebrow"><span class="dot"></span> 공개 등록부</div>
    <h1 class="lead-h">전국에 등록된 <span class="hl">자전거 현황</span></h1>
    <p class="lead-p">차대번호를 클릭하면 상세 정보를 확인할 수 있어요.</p>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">총 등록</div>
      <div class="stat-num accent" id="totalCount">-</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">정상</div>
      <div class="stat-num accent" id="normalCount">-</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">도난 신고</div>
      <div class="stat-num red" id="stolenCount">-</div>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="브랜드, 모델, 차대번호 검색...">
    <select class="filter-select" id="statusFilter">
      <option value="all">전체</option>
      <option value="normal">정상</option>
      <option value="stolen">도난</option>
    </select>
  </div>

  <div class="bike-grid" id="bikeGrid">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<script type="module">
  // 공유 클라이언트/유틸을 끌어다 씀 (키는 velo-config.js 한 곳에서만 관리)
  import { supabase, escapeHtml as esc } from '/velo-supabase.js'

  let allBikes = []

  async function init() {
    // 로그인 상태 확인
    const { data: { user } } = await supabase.auth.getUser()
    if (user) {
      const btn = document.getElementById('authBtn')
      btn.textContent = '대시보드'
      btn.href = '/dashboard'
    }

    await loadBikes()

    document.getElementById('searchInput').addEventListener('input', function() {
      renderBikes(filterBikes())
    })
    document.getElementById('statusFilter').addEventListener('change', function() {
      renderBikes(filterBikes())
    })
  }

  async function loadBikes() {
    const { data } = await supabase
      .from('bikes')
      .select('id, brand, model, serial, status, created_at')
      .order('created_at', { ascending: false })

    allBikes = data || []

    // 통계
    document.getElementById('totalCount').textContent = allBikes.length
    document.getElementById('normalCount').textContent = allBikes.filter(b => b.status === 'normal').length
    document.getElementById('stolenCount').textContent = allBikes.filter(b => b.status === 'stolen').length

    renderBikes(allBikes)
  }

  function filterBikes() {
    const q = document.getElementById('searchInput').value.toLowerCase()
    const status = document.getElementById('statusFilter').value
    return allBikes.filter(b => {
      const matchQ = !q || b.brand?.toLowerCase().includes(q) || b.model?.toLowerCase().includes(q) || b.serial?.toLowerCase().includes(q)
      const matchStatus = status === 'all' || b.status === status
      return matchQ && matchStatus
    })
  }

  function renderBikes(bikes) {
    const grid = document.getElementById('bikeGrid')
    if (!bikes.length) {
      grid.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>'
      return
    }
    const pad = n => String(n).padStart(2,'0')
    const fmtDate = d => { const dt = new Date(d); return `${dt.getFullYear()}.${pad(dt.getMonth()+1)}.${pad(dt.getDate())}` }

    grid.innerHTML = bikes.map(b => `
      <a href="/bike/${encodeURIComponent(b.serial)}" class="bike-card ${b.status === 'stolen' ? 'stolen' : ''}">
        <div class="bike-brand">${esc(b.brand || '-')}</div>
        <div class="bike-model">${esc(b.model || '-')}</div>
        <div class="bike-serial">${esc(b.serial)}</div>
        <span class="bike-status ${b.status === 'stolen' ? 'stolen' : 'normal'}">
          ${b.status === 'stolen' ? '🚨 도난 신고' : '✓ 정상'}
        </span>
        <div class="bike-date">등록일 ${fmtDate(b.created_at)}</div>
      </a>
    `).join('')
  }

  init()
</script>
<footer class="v-foot"><div class="v-foot-in">
  <div class="logo">VÉLO</div>
  <div class="links">
    <a href="/registry">등록 현황</a>
    <a href="/partner">샵 파트너십</a>
    <a href="/terms">이용약관</a>
    <a href="/privacy">개인정보</a>
  </div>
</div></footer>

</body>
</html>
