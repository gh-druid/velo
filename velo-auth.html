<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>벨로 (Vélo) — 로그인</title>
<link rel="stylesheet" href="./velo-common.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a; --white: #f5f3ee; --accent: #c8f542;
    --gray: #1a1a1a; --mid: #2e2e2e; --muted: #888;
    --error: #ff4f4f; --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--white); font-family:'Noto Sans KR',sans-serif; font-weight:300; min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }

  .left { background:var(--gray); display:flex; flex-direction:column; justify-content:space-between; padding:48px; position:relative; overflow:hidden; }
  .left-bg { position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 60%,rgba(200,245,66,0.06) 0%,transparent 70%); }
  .left-logo { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:4px; color:var(--accent); text-decoration:none; }
  .left-body { position:relative; z-index:1; }
  .left-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(56px,8vw,96px); line-height:0.9; margin-bottom:24px; }
  .left-title span { color:var(--accent); display:block; }
  .left-desc { font-size:14px; color:var(--muted); line-height:1.8; max-width:360px; }
  .left-features { display:flex; flex-direction:column; gap:16px; position:relative; z-index:1; }
  .left-feature { display:flex; align-items:center; gap:14px; font-size:13px; color:var(--muted); }
  .left-feature-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; flex-shrink:0; }

  .right { display:flex; align-items:center; justify-content:center; padding:48px; }
  .auth-box { width:100%; max-width:400px; }

  .step { display:none; flex-direction:column; gap:20px; }
  .step.active { display:flex; }

  .step-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:2px; margin-bottom:4px; }
  .step-sub { font-size:13px; color:var(--muted); margin-bottom:8px; line-height:1.7; }

  .field { display:flex; flex-direction:column; gap:8px; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .field label { font-size:11px; letter-spacing:2px; color:var(--muted); }
  .field input { background:var(--gray); border:1px solid var(--border); color:var(--white); padding:14px 16px; font-family:'Noto Sans KR',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
  .field input:focus { border-color:var(--accent); }
  .field input::placeholder { color:rgba(255,255,255,0.2); }

  /* OTP 입력 */
  .otp-wrap { display:flex; gap:8px; justify-content:center; }
  .otp-input { width:52px; height:60px; background:var(--gray); border:1px solid var(--border); color:var(--white); text-align:center; font-size:24px; font-family:'DM Mono',monospace; font-weight:700; outline:none; transition:border-color 0.2s; }
  .otp-input:focus { border-color:var(--accent); }

  .submit-btn { background:var(--accent); color:var(--black); border:none; padding:16px; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:opacity 0.2s; margin-top:4px; }
  .submit-btn:hover { opacity:0.9; }
  .submit-btn.loading { opacity:0.6; pointer-events:none; }

  .pw-strength { display:flex; gap:4px; margin-top:4px; }
  .pw-bar { height:3px; flex:1; background:rgba(255,255,255,0.1); transition:background 0.3s; }
  .pw-bar.weak { background:var(--error); }
  .pw-bar.medium { background:#f5a623; }
  .pw-bar.strong { background:var(--accent); }

  .agree-row { display:flex; align-items:flex-start; gap:12px; font-size:12px; color:var(--muted); line-height:1.6; cursor:pointer; }
  .agree-row input[type="checkbox"] { width:16px; height:16px; accent-color:var(--accent); flex-shrink:0; margin-top:2px; }
  .agree-row a { color:var(--white); text-decoration:underline; }

  .error-banner { background:rgba(255,79,79,0.1); border:1px solid rgba(255,79,79,0.3); color:var(--error); padding:12px 16px; font-size:13px; display:none; }
  .error-banner.show { display:block; }

  .resend-btn { background:none; border:none; color:var(--accent); font-family:'Noto Sans KR',sans-serif; font-size:12px; cursor:pointer; text-decoration:underline; padding:0; }
  .resend-btn:disabled { color:var(--muted); cursor:not-allowed; text-decoration:none; }

  .field-error { font-size:11px; color:var(--error); display:none; }
  .field-error.show { display:block; }

  @media(max-width:768px) {
    body { grid-template-columns:1fr; }
    .left { display:none; }
    .right { padding:40px 24px; align-items:flex-start; padding-top:80px; }
  }
</style>
</head>
<body>

<div class="left">
  <div class="left-bg"></div>
  <a href="velo-landing.html" class="left-logo">VÉLO</a>
  <div class="left-body">
    <h1 class="left-title">내 자전거를<br><span>지킨다.</span></h1>
    <p class="left-desc">NFC 칩 하나로 소유권을 등록하고, 도난을 막고, 중고거래에서 신뢰를 만드세요.</p>
  </div>
  <div class="left-features">
    <div class="left-feature"><div class="left-feature-dot"></div>차대번호 + NFC 칩 소유권 등록</div>
    <div class="left-feature"><div class="left-feature-dot"></div>전국 통합 도난 신고 & 조회 DB</div>
    <div class="left-feature"><div class="left-feature-dot"></div>1회용 코드로 간편 소유권 양도</div>
    <div class="left-feature"><div class="left-feature-dot"></div>월 490원, 언제든 해지 가능</div>
  </div>
</div>

<div class="right">
  <div class="auth-box">

    <div class="error-banner" id="errorBanner"></div>

    <!-- STEP 1: 이메일 + 회원가입 정보 -->
    <div class="step active" id="step1">
      <div>
        <div class="step-title">시작하기</div>
        <div class="step-sub">이메일을 입력하면 인증 코드를 보내드려요.<br>처음이라면 아래 정보도 함께 입력해주세요.</div>
      </div>

      <div class="field">
        <label>이메일</label>
        <input type="email" id="emailInput" placeholder="hello@velo.kr">
        <div class="field-error" id="emailErr">올바른 이메일을 입력해주세요.</div>
      </div>

      <!-- 신규 회원 정보 (이메일 입력 후 기존 회원 아닐 때 표시) -->
      <div id="signupFields" style="display:none; flex-direction:column; gap:16px;">
        <div style="font-size:12px; color:var(--accent); letter-spacing:1px;">처음 오셨네요! 아래 정보도 입력해주세요.</div>
        <div class="field-row">
          <div class="field">
            <label>이름</label>
            <input type="text" id="nameInput" placeholder="홍길동">
          </div>
          <div class="field">
            <label>연락처</label>
            <input type="tel" id="phoneInput" placeholder="010-0000-0000">
          </div>
        </div>
        <label class="agree-row">
          <input type="checkbox" id="agreeTerms">
          <span><a href="#">이용약관</a> 및 <a href="#">개인정보 처리방침</a>에 동의합니다. (필수)</span>
        </label>
        <label class="agree-row">
          <input type="checkbox" id="agreeStolen">
          <span>도난 신고 시 허위 신고에 대한 법적 책임을 집니다. (필수)</span>
        </label>
      </div>

      <button class="submit-btn" id="sendBtn" onclick="sendOTP()">인증 코드 받기</button>
    </div>

    <!-- STEP 2: OTP 입력 -->
    <div class="step" id="step2">
      <div>
        <div class="step-title">코드 입력</div>
        <div class="step-sub" id="otpSubText">이메일로 전송된 6자리 코드를 입력해주세요.</div>
      </div>

      <div class="otp-wrap" id="otpWrap">
        <input class="otp-input" maxlength="1" id="otp0">
        <input class="otp-input" maxlength="1" id="otp1">
        <input class="otp-input" maxlength="1" id="otp2">
        <input class="otp-input" maxlength="1" id="otp3">
        <input class="otp-input" maxlength="1" id="otp4">
        <input class="otp-input" maxlength="1" id="otp5">
      </div>

      <button class="submit-btn" id="verifyBtn" onclick="verifyOTP()">확인</button>

      <div style="font-size:12px; color:var(--muted); text-align:center;">
        코드를 못 받으셨나요?
        <button class="resend-btn" id="resendBtn" onclick="resendOTP()">재발송</button>
        <span id="resendTimer" style="display:none; color:var(--muted);"></span>
      </div>

      <button style="background:none;border:none;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;text-align:center;" onclick="goBack()">← 이메일 다시 입력</button>
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from './velo-supabase.js'

  let currentEmail = ''
  let isNewUser = false
  let resendInterval = null

  function showBanner(msg) {
    const el = document.getElementById('errorBanner')
    el.textContent = msg
    el.classList.add('show')
  }
  function hideBanner() {
    document.getElementById('errorBanner').classList.remove('show')
  }

  function showErr(id, show) {
    document.getElementById(id).classList.toggle('show', show)
    return show
  }

  // 이메일 입력 → 기존 유저 체크
  document.getElementById('emailInput').addEventListener('blur', async function() {
    const email = this.value.trim()
    if (!email || !/\S+@\S+\.\S+/.test(email)) return

    // 기존 유저인지 체크
    const { data } = await supabase
      .from('users')
      .select('id')
      .eq('email', email)
      .maybeSingle()

    const signupFields = document.getElementById('signupFields')
    isNewUser = !data
    signupFields.style.display = isNewUser ? 'flex' : 'none'
  })

  // OTP 발송
  window.sendOTP = async function() {
    const email = document.getElementById('emailInput').value.trim()
    if (!email || !/\S+@\S+\.\S+/.test(email)) { showErr('emailErr', true); return; }
    showErr('emailErr', false)

    if (isNewUser) {
      const name = document.getElementById('nameInput').value.trim()
      const phone = document.getElementById('phoneInput').value.trim()
      const terms = document.getElementById('agreeTerms').checked
      const stolen = document.getElementById('agreeStolen').checked
      if (!name || !phone || !terms || !stolen) { showBanner('모든 정보를 입력하고 약관에 동의해주세요.'); return; }
    }

    const btn = document.getElementById('sendBtn')
    btn.textContent = '발송 중...'; btn.classList.add('loading')

    try {
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { shouldCreateUser: true }
      })
      if (error) throw error

      currentEmail = email
      btn.textContent = '인증 코드 받기'; btn.classList.remove('loading')
      document.getElementById('otpSubText').textContent = `${email} 로 전송된 6자리 코드를 입력해주세요.`
      document.getElementById('step1').classList.remove('active')
      document.getElementById('step2').classList.add('active')
      document.getElementById('otp0').focus()
      startResendTimer()
      hideBanner()
    } catch(e) {
      btn.textContent = '인증 코드 받기'; btn.classList.remove('loading')
      showBanner(e.message || '발송 실패. 다시 시도해주세요.')
    }
  }

  // OTP 자동 포커스
  document.querySelectorAll('.otp-input').forEach((input, i) => {
    input.addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '')
      if (this.value && i < 5) document.getElementById(`otp${i+1}`).focus()
      if (i === 5 && this.value) verifyOTP()
    })
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value && i > 0)
        document.getElementById(`otp${i-1}`).focus()
    })
    input.addEventListener('paste', function(e) {
      e.preventDefault()
      const paste = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6)
      paste.split('').forEach((c, j) => {
        const el = document.getElementById(`otp${j}`)
        if (el) el.value = c
      })
      if (paste.length === 6) verifyOTP()
    })
  })

  // OTP 검증
  window.verifyOTP = async function() {
    const code = Array.from({length:6}, (_,i) => document.getElementById(`otp${i}`).value).join('')
    if (code.length !== 6) { showBanner('6자리 코드를 모두 입력해주세요.'); return; }

    const btn = document.getElementById('verifyBtn')
    btn.textContent = '확인 중...'; btn.classList.add('loading')

    try {
      const { data, error } = await supabase.auth.verifyOtp({
        email: currentEmail,
        token: code,
        type: 'email'
      })
      if (error) throw error

      // 신규 유저면 users 테이블에 저장
      if (isNewUser && data.user) {
        const name = document.getElementById('nameInput').value.trim()
        const phone = document.getElementById('phoneInput').value.trim()
        await supabase.from('users').upsert({
          id: data.user.id,
          name,
          phone,
          email: currentEmail
        })
      }

      location.href = 'velo-dashboard.html'
    } catch(e) {
      btn.textContent = '확인'; btn.classList.remove('loading')
      showBanner('코드가 올바르지 않습니다. 다시 확인해주세요.')
      document.querySelectorAll('.otp-input').forEach(el => el.value = '')
      document.getElementById('otp0').focus()
    }
  }

  // 재발송
  window.resendOTP = async function() {
    try {
      await supabase.auth.signInWithOtp({ email: currentEmail, options: { shouldCreateUser: true } })
      showBanner('코드가 재발송되었습니다.')
      setTimeout(hideBanner, 3000)
      startResendTimer()
    } catch(e) {
      showBanner('재발송 실패. 잠시 후 다시 시도해주세요.')
    }
  }

  function startResendTimer() {
    let sec = 60
    const btn = document.getElementById('resendBtn')
    const timer = document.getElementById('resendTimer')
    btn.style.display = 'none'
    timer.style.display = 'inline'
    if (resendInterval) clearInterval(resendInterval)
    resendInterval = setInterval(() => {
      timer.textContent = `(${sec}초 후 재발송 가능)`
      sec--
      if (sec < 0) {
        clearInterval(resendInterval)
        btn.style.display = 'inline'
        timer.style.display = 'none'
      }
    }, 1000)
  }

  window.goBack = function() {
    document.getElementById('step2').classList.remove('active')
    document.getElementById('step1').classList.add('active')
    document.querySelectorAll('.otp-input').forEach(el => el.value = '')
  }

  // 엔터키
  document.getElementById('emailInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendOTP()
  })
</script>
</body>
</html>
